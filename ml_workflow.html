<script>
const data = {
  goal:{title:"Define business goal",sub:"Step 1 — The foundation of every ML project",body:`<p>Before writing any code, clearly define what success looks like.</p><p><b>Key questions:</b></p><ul><li>Is this classification, regression, or clustering?</li><li>What metric will stakeholders judge success by?</li><li>What is the cost of a false positive vs. false negative?</li></ul><div class="divider"></div><p><b>Examples:</b></p><ul><li>"Predict customer churn in 30 days" → classification</li><li>"Predict house sale price" → regression</li></ul><span class="tag t-blue">Classification</span><span class="tag t-green">Regression</span><span class="tag t-amber">Clustering</span>`},
  data:{title:"Collect data",sub:"Step 2 — Garbage in, garbage out",body:`<p>Data quality and quantity is the single biggest factor in model performance.</p><p><b>Common sources:</b></p><ul><li>CSV / Excel files</li><li>SQL databases</li><li>REST APIs</li><li>Web scraping — BeautifulSoup, Scrapy</li><li>Public datasets — Kaggle, UCI ML Repository</li></ul><div class="divider"></div><p><b>Watch out for:</b></p><ul><li>Class imbalance</li><li>Data leakage — future info accidentally included</li><li>Sampling bias</li></ul><span class="tag t-blue">pandas</span><span class="tag t-blue">SQL</span><span class="tag t-green">Kaggle</span>`},
  split:{title:"Train / val / test split",sub:"Step 3 — Three-way split for clean evaluation",body:`<p>A three-way split gives you three distinct roles for your data:</p><ul><li><b>Train set</b> — the model learns from this</li><li><b>Validation set</b> — you make all tuning decisions here (model choice, hyperparameters)</li><li><b>Test set</b> — touched exactly once at the very end for an honest performance report</li></ul><div class="divider"></div><code>from sklearn.model_selection import train_test_split

# First split off the test set
X_temp, X_test, y_temp, y_test = train_test_split(
    X, y, test_size=0.15, random_state=42)

# Then split remaining into train and val
X_train, X_val, y_train, y_val = train_test_split(
    X_temp, y_temp, test_size=0.176, random_state=42)
# 0.176 of 85% ≈ 15% of total</code><p>Use <b>stratify=y</b> in both splits for classification tasks.</p><span class="tag t-blue">sklearn</span><span class="tag t-red">Split before preprocessing!</span>`},
  valset:{title:"Validation set",sub:"Your tuning sandbox — use it freely",body:`<p>The validation set is carved from your training data and used for all iterative decisions:</p><ul><li>Comparing different models</li><li>Choosing hyperparameters</li><li>Evaluating feature engineering ideas</li><li>Deciding when to stop training</li></ul><div class="divider"></div><p>You can evaluate on the val set as many times as you want. It's the safe zone for experimentation.</p><p><b>Alternative:</b> If your dataset is small, use cross-validation instead of a fixed val split — it gives a more stable estimate by rotating which rows are used for validation.</p><span class="tag t-amber">Reuse freely</span><span class="tag t-green">For all tuning decisions</span>`},
  testset:{title:"Test set — hold it out!",sub:"The golden rule of ML evaluation",body:`<p>The test set simulates real-world data your model has never seen. Touch it <b>exactly once</b> — after all decisions are finalized.</p><p><b>Why this matters:</b> Every time you peek at the test set and adjust based on it, you're effectively training on it. You lose an honest measure of generalization.</p><div class="divider"></div><p><b>What to use for tuning instead:</b></p><ul><li>Use <b>X_val</b> for model comparison and hyperparameter tuning</li><li>Use <b>cross-validation on X_train</b> if no separate val set</li><li>Reserve <b>X_test</b> for the final, single report</li></ul><span class="tag t-red">Never tune on test data</span><span class="tag t-green">Use exactly once</span>`},
  eda:{title:"EDA & data cleaning",sub:"Step 4 — Understand your data before modeling",body:`<p>Exploratory Data Analysis reveals patterns, anomalies, and relationships you must understand before modeling.</p><p><b>Key tasks:</b></p><ul><li>Check shape, dtypes, memory usage</li><li>Identify missing values and their patterns</li><li>Distribution plots — histograms, boxplots</li><li>Correlation matrix — find multicollinearity</li><li>Outlier detection via IQR or z-score</li></ul><div class="divider"></div><p><b>Tools:</b> pandas describe(), info(), seaborn pairplot(), heatmap(), missingno</p><span class="tag t-blue">pandas</span><span class="tag t-blue">seaborn</span><span class="tag t-blue">matplotlib</span>`},
  impute:{title:"Handling missing values",sub:"Imputation strategies",body:`<p><b>Drop</b> — only if missingness is random and under 5% of data.</p><p><b>Mean / Median</b> — fast and simple. Use median for skewed distributions.</p><p><b>KNN imputation</b> — finds k nearest rows and uses their values. More accurate but slower.</p><p><b>Iterative Imputer (MICE)</b> — models each missing feature as a function of others. Best for complex patterns.</p><div class="divider"></div><code>from sklearn.impute import KNNImputer
imp = KNNImputer(n_neighbors=5)
X_train = imp.fit_transform(X_train)
X_val   = imp.transform(X_val)
X_test  = imp.transform(X_test)  # no fit!</code><span class="tag t-blue">Mean/Median</span><span class="tag t-green">KNN</span><span class="tag t-amber">MICE</span>`},
  features:{title:"Feature engineering",sub:"Step 5 — Transform raw data into model-ready inputs",body:`<p>Often where the most performance is gained. Most algorithms need numerical input and are scale-sensitive.</p><p><b>Common transformations:</b></p><ul><li>Log transform — normalize right-skewed distributions</li><li>Polynomial features — capture non-linear relationships</li><li>Binning — convert continuous to categorical (age groups)</li><li>Date decomposition — day, month, weekday, is_holiday</li><li>Interaction features — multiply two features</li></ul><div class="divider"></div><p>Always <b>fit on X_train only</b>, then transform X_train, X_val, and X_test.</p><span class="tag t-blue">sklearn</span><span class="tag t-red">Fit on train only!</span>`},
  encoding:{title:"Categorical encoding",sub:"Converting categories to numbers",body:`<p><b>One-hot encoding</b> — binary column per category. Best for nominal features (color, city).</p><p><b>Ordinal encoding</b> — maps to integers. Use only when order is meaningful.</p><p><b>Target encoding</b> — replace category with mean of target. Powerful but risks leakage.</p><p><b>Frequency encoding</b> — replace with count/frequency. Good for high-cardinality features.</p><span class="tag t-blue">One-hot</span><span class="tag t-blue">Ordinal</span><span class="tag t-green">Target</span><span class="tag t-amber">High cardinality</span>`},
  scaling:{title:"Feature scaling",sub:"Normalizing numerical ranges",body:`<p><b>StandardScaler</b> — zero mean, unit variance. Best for most algorithms.</p><code>z = (x - mean) / std</code><p><b>MinMaxScaler</b> — scales to [0, 1]. Good for neural networks.</p><code>x_scaled = (x - min) / (max - min)</code><p><b>RobustScaler</b> — uses median and IQR. Resistant to outliers.</p><div class="divider"></div><p><b>Tree models</b> (Random Forest, XGBoost) do NOT need scaling.</p><span class="tag t-blue">StandardScaler</span><span class="tag t-blue">MinMaxScaler</span><span class="tag t-green">RobustScaler</span>`},
  pipeline:{title:"sklearn Pipeline",sub:"Package preprocessing + model into one object",body:`<p>A Pipeline chains preprocessing and the model together — preventing leakage and simplifying deployment.</p><code>from sklearn.pipeline import Pipeline
from sklearn.preprocessing import StandardScaler
from sklearn.ensemble import RandomForestClassifier

pipe = Pipeline([
  ('scaler', StandardScaler()),
  ('model', RandomForestClassifier())
])

pipe.fit(X_train, y_train)
pipe.predict(X_val)   # scaler auto-applied
pipe.predict(X_test)  # same pipeline, no leakage</code><span class="tag t-green">Best practice</span><span class="tag t-blue">sklearn</span>`},
  modeling:{title:"Modeling",sub:"Step 6 — Train your algorithm",body:`<p>Feed prepared training data into an algorithm that learns a mapping from inputs to outputs.</p><code>model = RandomForestClassifier()
model.fit(X_train, y_train)

# Evaluate on val, NOT test
y_pred = model.predict(X_val)
y_proba = model.predict_proba(X_val)[:, 1]</code><div class="divider"></div><p><b>Start simple:</b> Always begin with a baseline (Logistic Regression). Beat that before adding complexity.</p><span class="tag t-blue">fit()</span><span class="tag t-amber">Start simple</span>`},
  models:{title:"Model types overview",sub:"Choosing the right algorithm",body:`<p><b>Linear Regression</b> — continuous output, fast interpretable baseline.</p><p><b>Logistic Regression</b> — classification baseline despite the name.</p><p><b>Decision Tree</b> — interpretable but prone to overfitting alone.</p><p><b>Random Forest</b> — ensemble of trees, robust default for tabular data.</p><p><b>XGBoost / LightGBM</b> — state of the art for structured data.</p><p><b>KNN</b> — simple but slow on large datasets.</p><p><b>SVM</b> — works well in high dimensions.</p><p><b>Neural Networks</b> — best for images, text, audio.</p><span class="tag t-green">Random Forest — good default</span><span class="tag t-amber">XGBoost — tabular champion</span>`},
  overfitting:{title:"Overfitting vs underfitting",sub:"The bias-variance tradeoff",body:`<p><b>Overfitting</b> — great on train, poor on val/test. Memorized noise. train=99%, val=70%.</p><p><b>Underfitting</b> — too simple. Both train and val are low.</p><div class="divider"></div><p><b>Fixes for overfitting:</b></p><ul><li>More training data</li><li>Reduce model complexity</li><li>Regularization — L1 (Lasso), L2 (Ridge)</li><li>Dropout (neural networks)</li><li>Early stopping</li></ul><span class="tag t-red">Overfit: high train, low val</span><span class="tag t-amber">Underfit: low both</span>`},
  tuning:{title:"Hyperparameter tuning",sub:"Step 7 — Optimize model settings",body:`<p>Hyperparameters are settings chosen before training. Tuning finds the best combination.</p><p><b>Critical rule: always tune using X_val or cross-validation — never X_test.</b></p><ul><li><b>Grid Search</b> — exhaustive, slow but thorough</li><li><b>Randomized Search</b> — faster, near-optimal</li><li><b>Bayesian Optimization</b> — learns promising regions, most efficient</li><li><b>Optuna</b> — modern library for advanced tuning</li></ul><span class="tag t-blue">GridSearchCV</span><span class="tag t-blue">RandomizedSearchCV</span><span class="tag t-green">Optuna</span>`},
  cv:{title:"Cross-validation",sub:"More reliable performance estimation",body:`<p>K-fold CV splits training data into k parts, trains on k-1 and validates on 1, cycling through all combos. Final score = average.</p><code>from sklearn.model_selection import cross_val_score
scores = cross_val_score(
    model, X_train, y_train,
    cv=5, scoring='accuracy')
print(scores.mean(), scores.std())</code><p>Use <b>StratifiedKFold</b> for classification. k=5 or k=10 are most common.</p><div class="divider"></div><p>When using CV you may not need a separate val set — CV handles the tuning estimation internally. X_test is still reserved for the final report.</p><span class="tag t-blue">5-fold</span><span class="tag t-green">StratifiedKFold</span>`},
  gridsearch:{title:"Grid search",sub:"Systematic hyperparameter optimization",body:`<p>GridSearchCV tries every parameter combination and scores each with cross-validation.</p><code>from sklearn.model_selection import GridSearchCV

param_grid = {
  'n_estimators': [100, 200, 500],
  'max_depth': [3, 5, None],
  'min_samples_split': [2, 5]
}

gs = GridSearchCV(RandomForestClassifier(),
    param_grid, cv=5, scoring='f1')
gs.fit(X_train, y_train)
print(gs.best_params_)

# Evaluate best model on val set
y_pred = gs.predict(X_val)</code><span class="tag t-blue">GridSearchCV</span><span class="tag t-amber">Can be slow</span>`},
  eval:{title:"Evaluate on validation set",sub:"Step 8 — Measure generalization during development",body:`<p>Use X_val (not X_test) for all iterative evaluation during development.</p><code>y_pred  = model.predict(X_val)
y_proba = model.predict_proba(X_val)[:, 1]</code><div class="divider"></div><p><b>Ask yourself:</b></p><ul><li>Better than a naive baseline?</li><li>Is the train–val gap too large? (overfitting)</li><li>Are both scores low? (underfitting)</li><li>Does the metric match the business goal?</li></ul><p>Repeat this step freely — that's what the val set is for. Only switch to X_test when you're truly done.</p><span class="tag t-amber">X_val — reuse freely here</span><span class="tag t-red">Not X_test yet!</span>`},
  val_vs_test:{title:"Val vs test — what to use when?",sub:"The most common source of confusion in ML",body:`<p><b>During development → always X_val</b></p><code>y_pred  = model.predict(X_val)
y_proba = model.predict_proba(X_val)[:, 1]</code><p>Use this while iterating — comparing models, tuning hyperparameters, engineering features. You can look at val results as many times as you want.</p><div class="divider"></div><p><b>Final report only → X_test</b></p><code>y_pred  = model.predict(X_test)
y_proba = model.predict_proba(X_test)[:, 1]</code><p>Use this exactly once, after all decisions are locked. This is your honest, unbiased estimate of real-world performance.</p><div class="divider"></div><p><b>Why it matters:</b> Every time you adjust your model based on test set results — even without calling fit() — you're indirectly fitting to the test distribution. Your reported score becomes optimistically biased.</p><span class="tag t-amber">Val → iterate freely</span><span class="tag t-red">Test → once, at the end</span>`},
  clf_metrics:{title:"Classification metrics",sub:"Measuring categorical prediction quality",body:`<p><b>Accuracy</b> — % correctly classified. Misleading for imbalanced classes.</p><p><b>Precision</b> — of predicted positives, how many were actually positive? Use when false positives are costly.</p><p><b>Recall</b> — of actual positives, how many did we catch? Use when false negatives are costly.</p><p><b>F1 Score</b> — harmonic mean of precision and recall. Best for imbalanced datasets.</p><p><b>ROC-AUC</b> — 0.5 = random, 1.0 = perfect. Threshold-independent.</p><p><b>Confusion matrix</b> — full TP/TN/FP/FN breakdown. Always look at this.</p><span class="tag t-blue">Accuracy</span><span class="tag t-blue">F1</span><span class="tag t-green">ROC-AUC</span>`},
  reg_metrics:{title:"Regression metrics",sub:"Measuring continuous prediction quality",body:`<p><b>MAE</b> — average absolute difference. Robust to outliers, easy to interpret.</p><p><b>MSE</b> — average squared error. Penalizes large errors heavily.</p><p><b>RMSE</b> — square root of MSE. Back in original units, most commonly reported.</p><p><b>MAPE</b> — error as % of actual. Intuitive but undefined when actual = 0.</p><p><b>R²</b> — proportion of variance explained. 1.0 = perfect, 0.0 = predicts the mean.</p><span class="tag t-blue">MAE</span><span class="tag t-blue">RMSE</span><span class="tag t-green">R²</span><span class="tag t-amber">MAPE</span>`},
  decision:{title:"Is the model good enough?",sub:"Deciding whether to iterate or finalize",body:`<p>Compare val performance against the business requirements from Step 1.</p><p><b>Good enough means:</b></p><ul><li>Metric exceeds your defined threshold (e.g. F1 > 0.85)</li><li>Better than current system or naive baseline</li><li>Consistent across CV folds (low std dev)</li><li>Errors acceptable from a business perspective</li></ul><div class="divider"></div><p><b>Not good enough? Go back to:</b></p><ul><li>Feature engineering — create better features</li><li>Data collection — get more data</li><li>Model selection — try a different algorithm</li><li>Hyperparameter tuning</li></ul><span class="tag t-green">Meets threshold → proceed to test</span><span class="tag t-red">Fails → iterate on val</span>`},
  finaltest:{title:"Final test set evaluation",sub:"The honest, once-only performance report",body:`<p>Now — and only now — evaluate on the test set locked away at the start.</p><code>y_pred  = final_model.predict(X_test)
y_proba = final_model.predict_proba(X_test)[:, 1]

from sklearn.metrics import classification_report
print(classification_report(y_test, y_pred))</code><div class="divider"></div><p><b>If test performance is much worse than val:</b> you likely overfit to the val set during tuning, or your splits were not representative. Do not tune further based on this number.</p><p>This score is what you report to stakeholders as the model's real-world performance estimate.</p><span class="tag t-red">Use exactly once</span><span class="tag t-green">Honest estimate</span>`},
  solved:{title:"Problem solved — deploy!",sub:"Getting the model into production",body:`<p><b>Common deployment approaches:</b></p><ul><li><b>REST API</b> — wrap in FastAPI/Flask, expose /predict endpoint</li><li><b>Batch prediction</b> — run on new data periodically</li><li><b>Embedded</b> — serialize with joblib/pickle, load in app code</li><li><b>Cloud ML platforms</b> — AWS SageMaker, GCP Vertex AI, Azure ML</li></ul><div class="divider"></div><p><b>After deployment, monitor:</b> prediction drift, data drift, model degradation. Real-world data changes — models go stale.</p><span class="tag t-blue">FastAPI</span><span class="tag t-blue">joblib</span><span class="tag t-green">MLflow</span><span class="tag t-amber">Monitor drift</span>`},
  error:{title:"Error analysis",sub:"Understanding where and why your model fails",body:`<p><b>Techniques:</b></p><ul><li><b>Confusion matrix</b> — which classes are being confused?</li><li><b>Residual plot</b> — where are the largest regression errors?</li><li><b>Feature importance</b> — which features drive predictions?</li><li><b>SHAP values</b> — explain individual predictions</li><li><b>Learning curves</b> — does more data help?</li><li><b>Slice analysis</b> — underperformance on specific subgroups?</li></ul><div class="divider"></div><p>Error analysis almost always points clearly to the next action: more data, better features, or a different model.</p><span class="tag t-blue">SHAP</span><span class="tag t-amber">Learning curves</span><span class="tag t-red">Slice analysis</span>`}
};
